<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="networkGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#00F5FF"></stop>
      <stop offset="100%" stop-color="#005DFF"></stop>
    </linearGradient>
  </defs>

  <g stroke="url(#networkGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Central Network Hub -->
    <circle cx="256" cy="256" r="48"></circle>

    <!-- Inner Core -->
    <circle cx="256" cy="256" r="14"></circle>

    <!-- Main Connection Lines -->
    <line x1="256" y1="208" x2="256" y2="120"></line>
    <line x1="256" y1="304" x2="256" y2="392"></line>

    <line x1="208" y1="256" x2="120" y2="256"></line>
    <line x1="304" y1="256" x2="392" y2="256"></line>

    <line x1="222" y1="222" x2="160" y2="160"></line>
    <line x1="290" y1="222" x2="352" y2="160"></line>

    <line x1="222" y1="290" x2="160" y2="352"></line>
    <line x1="290" y1="290" x2="352" y2="352"></line>

    <!-- Network Nodes -->
    <circle cx="256" cy="95" r="22"></circle>
    <circle cx="256" cy="417" r="22"></circle>

    <circle cx="95" cy="256" r="22"></circle>
    <circle cx="417" cy="256" r="22"></circle>

    <circle cx="145" cy="145" r="20"></circle>
    <circle cx="367" cy="145" r="20"></circle>

    <circle cx="145" cy="367" r="20"></circle>
    <circle cx="367" cy="367" r="20"></circle>

    <!-- Server Rack Left -->
    <rect x="40" y="80" width="55" height="110" rx="10"></rect>
    <line x1="52" y1="105" x2="82" y2="105"></line>
    <line x1="52" y1="130" x2="82" y2="130"></line>
    <line x1="52" y1="155" x2="82" y2="155"></line>

    <!-- Server Rack Right -->
    <rect x="417" y="322" width="55" height="110" rx="10"></rect>
    <line x1="429" y1="347" x2="459" y2="347"></line>
    <line x1="429" y1="372" x2="459" y2="372"></line>
    <line x1="429" y1="397" x2="459" y2="397"></line>

    <!-- Connection Paths -->
    <path d="M95 135C125 135 125 145 145 145"></path>
    <path d="M367 367C395 367 405 377 417 377"></path>

    <!-- Decorative Data Pulses -->
    <circle cx="256" cy="165" r="6"></circle>
    <circle cx="347" cy="256" r="6"></circle>
    <circle cx="256" cy="347" r="6"></circle>
    <circle cx="165" cy="256" r="6"></circle>

    <!-- Outer Cyber Ring -->
    <circle cx="256" cy="256" r="175" opacity="0.15"></circle>
    <circle cx="256" cy="256" r="205" opacity="0.08"></circle>

  </g>

</svg>