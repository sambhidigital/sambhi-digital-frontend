<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon Glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="blueGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#00E5FF"></stop>
      <stop offset="100%" stop-color="#007BFF"></stop>
    </linearGradient>
  </defs>

  <!-- Main Group -->
  <g stroke="url(#blueGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)">

    <!-- AI Brain -->
    <path d="
      M190 160
      C150 160 125 190 125 225
      C125 255 140 278 165 290
      C168 330 195 360 240 365

      M322 160
      C362 160 387 190 387 225
      C387 255 372 278 347 290
      C344 330 317 360 272 365
    "></path>

    <!-- Center Divider -->
    <line x1="256" y1="150" x2="256" y2="365"></line>

    <!-- Brain Circuits -->
    <path d="M180 210 H230"></path>
    <circle cx="230" cy="210" r="8"></circle>

    <path d="M180 260 H220"></path>
    <circle cx="220" cy="260" r="8"></circle>

    <path d="M332 210 H282"></path>
    <circle cx="282" cy="210" r="8"></circle>

    <path d="M332 260 H292"></path>
    <circle cx="292" cy="260" r="8"></circle>

    <!-- Central AI Core -->
    <circle cx="256" cy="256" r="38"></circle>
    <text x="228" y="265" font-size="28" font-family="Arial" fill="#00D9FF" stroke="none" font-weight="bold">
      AI
    </text>

    <!-- Workflow Nodes -->
    <rect x="60" y="110" width="70" height="38" rx="10"></rect>
    <rect x="60" y="220" width="70" height="38" rx="10"></rect>
    <rect x="60" y="330" width="70" height="38" rx="10"></rect>

    <!-- Workflow Arrows -->
    <path d="M130 129 C170 129 170 170 190 190"></path>
    <path d="M130 239 C170 239 170 245 190 245"></path>
    <path d="M130 349 C170 349 170 310 190 290"></path>

    <!-- Right Automation -->
    <rect x="382" y="160" width="70" height="38" rx="10"></rect>
    <rect x="382" y="250" width="70" height="38" rx="10"></rect>

    <path d="M322 210 C350 210 360 180 382 180"></path>
    <path d="M322 280 C350 280 360 270 382 270"></path>

    <!-- Gear -->
    <circle cx="410" cy="370" r="32"></circle>
    <circle cx="410" cy="370" r="12"></circle>

    <!-- Gear Teeth -->
    <line x1="410" y1="325" x2="410" y2="340"></line>
    <line x1="410" y1="400" x2="410" y2="415"></line>

    <line x1="365" y1="370" x2="380" y2="370"></line>
    <line x1="440" y1="370" x2="455" y2="370"></line>

    <line x1="380" y1="340" x2="390" y2="350"></line>
    <line x1="430" y1="390" x2="440" y2="400"></line>

    <line x1="380" y1="400" x2="390" y2="390"></line>
    <line x1="430" y1="350" x2="440" y2="340"></line>

  </g>

</svg>