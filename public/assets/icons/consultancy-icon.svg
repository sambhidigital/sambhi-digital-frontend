<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="consultGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#00F5FF"></stop>
      <stop offset="100%" stop-color="#0072FF"></stop>
    </linearGradient>
  </defs>

  <g stroke="url(#consultGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Main Circle -->
    <circle cx="256" cy="210" r="70"></circle>

    <!-- Person Icon -->
    <circle cx="256" cy="185" r="22"></circle>
    <path d="M220 240C228 218 248 210 256 210C264 210 284 218 292 240"></path>

    <!-- Analytics Board -->
    <rect x="120" y="110" width="90" height="70" rx="12"></rect>
    
    <!-- Chart Lines -->
    <polyline points="138,155 158,140 178,148 195,125"></polyline>
    <line x1="140" y1="165" x2="190" y2="165"></line>

    <!-- Tech Dashboard -->
    <rect x="302" y="110" width="90" height="70" rx="12"></rect>

    <!-- Dashboard Elements -->
    <circle cx="325" cy="135" r="6"></circle>
    <line x1="340" y1="135" x2="372" y2="135"></line>

    <circle cx="325" cy="160" r="6"></circle>
    <line x1="340" y1="160" x2="365" y2="160"></line>

    <!-- Connection Lines -->
    <line x1="210" y1="145" x2="235" y2="170"></line>
    <line x1="302" y1="145" x2="277" y2="170"></line>

    <!-- Bottom Strategy Blocks -->
    <rect x="110" y="340" width="90" height="40" rx="12"></rect>
    <rect x="211" y="340" width="90" height="40" rx="12"></rect>
    <rect x="312" y="340" width="90" height="40" rx="12"></rect>

    <!-- Linking Lines -->
    <line x1="256" y1="280" x2="256" y2="320"></line>
    <line x1="155" y1="320" x2="357" y2="320"></line>

    <line x1="155" y1="320" x2="155" y2="340"></line>
    <line x1="256" y1="320" x2="256" y2="340"></line>
    <line x1="357" y1="320" x2="357" y2="340"></line>

    <!-- Decorative Circuit Nodes -->
    <circle cx="95" cy="210" r="7"></circle>
    <line x1="102" y1="210" x2="140" y2="210"></line>

    <circle cx="417" cy="210" r="7"></circle>
    <line x1="372" y1="210" x2="410" y2="210"></line>

  </g>

</svg>