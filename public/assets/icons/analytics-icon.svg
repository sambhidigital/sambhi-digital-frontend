<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- Gradient -->
    <linearGradient id="analyticsGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#00F5FF"></stop>
      <stop offset="100%" stop-color="#006BFF"></stop>
    </linearGradient>
  </defs>

  <g stroke="url(#analyticsGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">

    <!-- Dashboard Frame -->
    <rect x="90" y="90" width="332" height="260" rx="24"></rect>

    <!-- Dashboard Top Line -->
    <line x1="90" y1="145" x2="422" y2="145"></line>

    <!-- Dashboard Dots -->
    <circle cx="120" cy="118" r="6"></circle>
    <circle cx="145" cy="118" r="6"></circle>
    <circle cx="170" cy="118" r="6"></circle>

    <!-- Graph Grid -->
    <line x1="145" y1="305" x2="370" y2="305"></line>
    <line x1="145" y1="260" x2="370" y2="260"></line>
    <line x1="145" y1="215" x2="370" y2="215"></line>

    <!-- Analytics Bars -->
    <rect x="165" y="245" width="28" height="60" rx="6"></rect>
    <rect x="220" y="210" width="28" height="95" rx="6"></rect>
    <rect x="275" y="180" width="28" height="125" rx="6"></rect>
    <rect x="330" y="155" width="28" height="150" rx="6"></rect>

    <!-- AI Trend Line -->
    <path d="M160 285L235 235L290 205L345 165"></path>

    <!-- Trend Nodes -->
    <circle cx="160" cy="285" r="8"></circle>
    <circle cx="235" cy="235" r="8"></circle>
    <circle cx="290" cy="205" r="8"></circle>
    <circle cx="345" cy="165" r="8"></circle>

    <!-- Bottom AI Data Cards -->
    <rect x="105" y="385" width="85" height="42" rx="12"></rect>
    <rect x="214" y="385" width="85" height="42" rx="12"></rect>
    <rect x="323" y="385" width="85" height="42" rx="12"></rect>

    <!-- Connection Lines -->
    <line x1="148" y1="350" x2="148" y2="385"></line>
    <line x1="256" y1="350" x2="256" y2="385"></line>
    <line x1="365" y1="350" x2="365" y2="385"></line>

    <!-- Side Circuit Nodes -->
    <circle cx="70" cy="220" r="7"></circle>
    <line x1="77" y1="220" x2="105" y2="220"></line>

    <circle cx="442" cy="220" r="7"></circle>
    <line x1="407" y1="220" x2="435" y2="220"></line>

    <!-- Decorative AI Rings -->
    <circle cx="390" cy="120" r="18"></circle>
    <circle cx="390" cy="120" r="6"></circle>

  </g>

</svg>